<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Provider Profile | EventLens</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<!-- NAVBAR -->

<nav class="navbar navbar-dark bg-dark">

  <div class="container">

    <a href="provider_dashboard.html"
       class="navbar-brand">

      <i class="fa fa-arrow-left me-2"></i>

      Back to Dashboard

    </a>

  </div>

</nav>

<!-- PROFILE -->

<div class="container mt-5">

  <div class="card shadow border-0">

    <div class="card-body p-5">

      <div class="row">

        <!-- LEFT SIDE -->

        <div class="col-md-4 text-center border-end">

          <img src="../images/provider1.jpg"
               class="rounded-circle shadow mb-3"
               width="180"
               height="180">

          <h3 id="providerName"></h3>

          <p class="text-muted fs-5"
             id="providerRole"></p>

          <button class="btn btn-warning mt-3"
                  onclick="openEditProfile()">

            <i class="fa fa-pen"></i>

            Edit Profile

          </button>

        </div>

        <!-- RIGHT SIDE -->

        <div class="col-md-8">

          <h3 class="mb-4">

            <i class="fa fa-user text-warning me-2"></i>

            Personal Information

          </h3>

          <div class="row">

            <div class="col-md-6 mb-4">

              <label class="fw-bold text-secondary">

                Email

              </label>

              <p id="providerEmail"
                 class="fs-5"></p>

            </div>

            <div class="col-md-6 mb-4">

              <label class="fw-bold text-secondary">

                Phone

              </label>

              <p id="providerPhone"
                 class="fs-5"></p>

            </div>

            <div class="col-md-6 mb-4">

              <label class="fw-bold text-secondary">

                Location

              </label>

              <p id="providerLocation"
                 class="fs-5"></p>

            </div>

            <div class="col-md-6 mb-4">

              <label class="fw-bold text-secondary">

                Experience

              </label>

              <p id="providerExperience"
                 class="fs-5"></p>

            </div>

            <div class="col-12">

              <label class="fw-bold text-secondary">

                About Me

              </label>

                <p id="providerAbout"
                   class="fs-5"></p>


            </div>

          </div>

        </div>

      </div>

    </div>

  </div>

  <!-- PORTFOLIO -->

  <div class="card shadow border-0 mt-5">

    <div class="card-header bg-dark text-white">

      <h4 class="mb-0">

        <i class="fa fa-images me-2"></i>

        Portfolio

      </h4>

    </div>

    <div class="card-body">

      <div class="row g-4">

        <div class="col-md-4">

          <img src="../images/provider1.jpg"
               class="img-fluid rounded shadow">

        </div>

        <div class="col-md-4">

          <img src="../images/provider2.jpg"
               class="img-fluid rounded shadow">

        </div>

        <div class="col-md-4">

          <img src="../images/provider3.jpg"
               class="img-fluid rounded shadow">

        </div>

      </div>

    </div>

  </div>

</div>

<!-- EDIT PROFILE MODAL -->

<div class="modal fade"
     id="editProfileModal">

  <div class="modal-dialog">

    <div class="modal-content">

      <div class="modal-header">

        <h5>Edit Profile</h5>

        <button class="btn-close"
                data-bs-dismiss="modal"></button>

      </div>

      <div class="modal-body">

        <label class="form-label">

          Business Name

        </label>

        <input id="editName"
               class="form-control mb-3">

        <label class="form-label">

          Phone

        </label>

        <input id="editPhone"
               class="form-control mb-3">

        <label class="form-label">

          Location

        </label>

        <input id="editLocation"
               class="form-control mb-3">

        <label class="form-label">

          Experience

        </label>

        <input id="editExperience"
               class="form-control mb-3">

        <label class="form-label">

          About Me

        </label>

        <textarea id="editAbout"
                  rows="4"
                  class="form-control"></textarea>

      </div>

      <div class="modal-footer">

        <button class="btn btn-secondary"
                data-bs-dismiss="modal">

          Cancel

        </button>

        <button class="btn btn-success"
                onclick="updateProfile()">

          <i class="fa fa-save me-1"></i>

          Save Changes

        </button>

      </div>

    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="../js/provider_profile.js"></script>

</body>
</html>
