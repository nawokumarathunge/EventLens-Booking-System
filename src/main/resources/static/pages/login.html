<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EventLens</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../styles/style.css">
</head>

<body class="login-body">

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container">

        <a class="navbar-brand fw-bold d-flex align-items-center" href="../index.html">
            <i class="fa fa-camera text-warning me-2 fs-4"></i>
            EventLens
        </a>

        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navMenu">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="../index.html">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="../index.html#services">Services</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="../providers.html">Providers</a>
                </li>

            </ul>

        </div>
    </div>
</nav>

<!-- ================= LOGIN FORM ================= -->

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card login-card shadow-lg p-4" style="width:420px;">

        <h3 class="text-center mb-4">
            <i class="fa fa-camera text-warning"></i>
            EventLens Login
        </h3>

        <form>

            <!-- Login As -->
            <div class="mb-3">
                <label class="form-label">Login As</label>

                <select class="form-select" id="role">
                    <option value="customer">Customer</option>
                    <option value="provider">Provider</option>
                </select>
            </div>

            <!-- Email -->
            <div class="mb-3">

                <label class="form-label">Email Address</label>

                <input
                        type="email"
                        id="email"
                        class="form-control"
                        placeholder="Enter your email"
                        required>

            </div>

            <!-- Password -->
            <div class="mb-3">

                <label class="form-label">Password</label>

                <input
                        type="password"
                        id="password"
                        class="form-control"
                        placeholder="Enter your password"
                        required>

            </div>

            <!-- Remember Me -->
            <div class="mb-3 form-check">

                <input
                        type="checkbox"
                        class="form-check-input"
                        id="remember">

                <label class="form-check-label" for="remember">
                    Remember Me
                </label>

            </div>

            <!-- Login Button -->
            <button
                    type="button"
                    class="btn btn-warning w-100"
                    onclick="loginUser()">

                Login

            </button>

            <!-- Forgot Password -->

            <div class="text-center mt-3">

                <a href="#" class="text-decoration-none">
                    Forgot Password?
                </a>

            </div>

            <!-- Register -->

            <div class="text-center mt-3">

                <p>

                    Don't have an account?

                    <a href="register.html"
                       class="fw-bold register-link">

                        Register Here

                    </a>

                </p>

            </div>

        </form>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Login Redirect -->
<script>

    function loginUser(){

        const data = {
            email: document.getElementById("email").value,
            password: document.getElementById("password").value
        };


        fetch("http://localhost:8080/api/users/login", {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify(data)

        })

            .then(response => {

                if(!response.ok){
                    throw new Error("Login failed");
                }

                return response.json();

            })

            .then(user=>{

                console.log(user);


                localStorage.setItem(
                    "user",
                    JSON.stringify(user)
                );


                if(user.role === "CUSTOMER"){

                    window.location.href="customer_dashboard.html";

                }

                else if(
                    user.role === "PHOTOGRAPHER" ||
                    user.role === "VIDEOGRAPHER"
                ){

                    window.location.href="provider_dashboard.html";

                }

            })

            .catch(error => {

                alert("Invalid Email or Password.");
                console.log(error);

            });

    }

</script>


</body>
</html>
