<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Review Provider | EventLens</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="../styles/style.css">

</head>

<body class="review-body">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container">

        <a class="navbar-brand" href="customer_dashboard.html">
            <i class="fa fa-arrow-left me-2"></i>
            Back to Dashboard
        </a>

    </div>
</nav>

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-7">

<div class="card shadow review-card">

<div class="card-body p-5">

<h2 class="text-center mb-4">
<i class="fa fa-star text-warning"></i>
Leave Your Review
</h2>

<form>

<div class="mb-3">

<label class="form-label">Provider</label>

<input
type="text"
class="form-control"
id="providerName"
readonly>

</div>

<div class="mb-4 text-center">

<label class="form-label d-block mb-3">

Rate Your Experience

</label>

<div class="star-rating">

<i class="fa-regular fa-star star" data-value="1"></i>
<i class="fa-regular fa-star star" data-value="2"></i>
<i class="fa-regular fa-star star" data-value="3"></i>
<i class="fa-regular fa-star star" data-value="4"></i>
<i class="fa-regular fa-star star" data-value="5"></i>

</div>

<input type="hidden" id="rating" value="0">

<p class="mt-3 fw-bold" id="ratingText">

No Rating Selected

</p>

</div>

<div class="mb-4">

<label class="form-label">

Write Review

</label>

<textarea
        id="comment"
        class="form-control"
        rows="5"
placeholder="Share your experience..."></textarea>

</div>

<button
type="button"
class="btn btn-warning w-100"
onclick="submitReview()">

Submit Review

</button>

</form>

</div>

</div>

</div>

</div>

</div>
<script src="../js/review.js"></script>


</body>
</html>
