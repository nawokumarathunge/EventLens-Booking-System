<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Customer Profile | EventLens</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<!-- Navbar -->

<nav class="navbar navbar-dark bg-dark">

    <div class="container">

        <a href="customer_dashboard.html"
           class="navbar-brand">

            <i class="fa fa-arrow-left me-2"></i>

            Back to Dashboard

        </a>

    </div>

</nav>


<div class="container my-5">

    <div class="card shadow border-0">

        <div class="card-body p-5">

            <div class="row">

                <!-- Left -->

                <div class="col-md-4 text-center">

                    <img src="../images/customer.jpg"
                         class="rounded-circle shadow mb-3"
                         width="180"
                         height="180">

                    <h3 id="customerName"></h3>

                    <span class="badge bg-warning text-dark fs-6"
                          id="customerRole">
                    </span>

                </div>


                <!-- Right -->

                <div class="col-md-8">

                    <h3 class="mb-4">

                        <i class="fa fa-user text-warning me-2"></i>

                        Personal Information

                    </h3>

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <strong>Email</strong>

                            <p id="customerEmail"></p>

                        </div>

                        <div class="col-md-6 mb-3">

                            <strong>Phone</strong>

                            <p id="customerPhone"></p>

                        </div>

                        <div class="col-md-6 mb-3">

                            <strong>Address</strong>
                            <p id="customerLocation"></p>

                        </div>


                    </div>

                    <hr>

                    <h5>

                        <i class="fa fa-circle-info text-primary me-2"></i>

                        About

                    </h5>

                    <p id="customerAbout"></p>

                    <button class="btn btn-warning mt-3"
                            onclick="openEditProfile()">

                        <i class="fa fa-pen me-2"></i>

                        Edit Profile

                    </button>

                </div>

            </div>

        </div>

    </div>

</div>


<!-- Edit Modal -->

<div class="modal fade"
     id="editProfileModal">

    <div class="modal-dialog modal-lg">

        <div class="modal-content">

            <div class="modal-header bg-warning">

                <h5 class="modal-title">

                    Edit Profile

                </h5>

                <button class="btn-close"
                        data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body">

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label>Name</label>

                        <input
                                id="editName"
                                class="form-control">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Phone</label>

                        <input
                                id="editPhone"
                                class="form-control">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Address</label>

                        <input
                                id="editLocation"
                                class="form-control">

                    </div>

                    <div class="col-md-12">

                        <label>About</label>

                        <textarea
                                id="editAbout"
                                rows="4"
                                class="form-control">
                        </textarea>

                    </div>

                </div>

            </div>

            <div class="modal-footer">

                <button class="btn btn-secondary"
                        data-bs-dismiss="modal">

                    Cancel

                </button>

                <button class="btn btn-success"
                        onclick="updateProfile()">

                    <i class="fa fa-save me-2"></i>

                    Save Changes

                </button>

            </div>

        </div>

    </div>

</div>


<footer class="bg-dark text-white text-center p-3 mt-5">

    © 2026 EventLens | Customer Profile

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="../js/customer_profile.js"></script>

</body>
</html>
