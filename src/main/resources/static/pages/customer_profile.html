<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Profile | EventLens</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body class="dashboard-bg">

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand fw-bold" href="index.html">
<i class="fa-solid fa-camera text-warning me-2"></i>
EventLens
</a>

<div class="ms-auto">

<a href="customer_dashboard.html" class="btn btn-outline-light me-2">
Dashboard
</a>

<a href="providers.html" class="btn btn-outline-warning me-2">
Find Providers
</a>

<a href="login.html" class="btn btn-danger">
Logout
</a>

</div>

</div>

</nav>

<!-- PROFILE -->

<div class="container mt-5">

<div class="card shadow border-0 p-5">

<div class="row">

<!-- LEFT -->

<div class="col-md-4 text-center">

<img src="images/customer.jpg"
class="customer-profile-img mb-3">

<h3>Nick Perera</h3>

<p class="text-muted">
Customer
</p>

<button class="btn btn-warning">
<i class="fa fa-camera"></i>
Change Photo
</button>

</div>

<!-- RIGHT -->

<div class="col-md-8">

<h3 class="mb-4">

<i class="fa fa-user text-warning"></i>

Personal Information

</h3>

<form>

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">
Full Name
</label>

<input
type="text"
class="form-control"
value="Nick Perera">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
Email
</label>

<input
type="email"
class="form-control"
value="nick@gmail.com">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
Phone Number
</label>

<input
type="text"
class="form-control"
value="0771234567">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
Address
</label>

<input
type="text"
class="form-control"
value="Colombo">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
Date of Birth
</label>

<input
type="date"
class="form-control"
value="2003-06-15">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
Gender
</label>

<select class="form-select">

<option selected>Female</option>

<option>Male</option>

<option>Other</option>

</select>

</div>

</div>

<hr>

<h4 class="mt-4">

<i class="fa fa-lock text-danger"></i>

Change Password

</h4>

<div class="row">

<div class="col-md-4">

<input
type="password"
class="form-control"
placeholder="Current Password">

</div>

<div class="col-md-4">

<input
type="password"
class="form-control"
placeholder="New Password">

</div>

<div class="col-md-4">

<input
type="password"
class="form-control"
placeholder="Confirm Password">

</div>

</div>

<div class="mt-4">

<button class="btn btn-success">
<i class="fa fa-save"></i>
Save Changes
</button>

<button type="reset"
class="btn btn-secondary">

Reset

</button>

</div>

</form>

</div>

</div>

</div>

</div>

<!-- FOOTER -->

<footer class="bg-dark text-white text-center p-3 mt-5">

© 2026 EventLens | Customer Profile

</footer>

</body>
</html>
