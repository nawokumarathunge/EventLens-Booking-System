<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Provider Dashboard | EventLens</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

  <link rel="stylesheet" href="../styles/style.css">
</head>

<body class="dashboard-body">

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="../index.html">
      <i class="fa fa-camera text-warning me-2"></i> Provider Dashboard
    </a>

    <a href="#" onclick="logout()" class="btn btn-danger btn-sm">
      Logout
    </a>  </div>
</nav>

<!-- ================= DASHBOARD ================= -->
<div class="container mt-4">

  <div class="row">

    <!-- PROFILE CARD -->
    <div class="col-md-4">
      <div class="card shadow p-3 profile-card">
        <h5>Profile</h5>
        <hr>

        <p><b>Name:</b> <span id="providerName"></span></p>
        <p><b>Role:</b> <span id="providerRole"></span></p>
        <p><b>Location:</b> <span id="providerEmail"></p>

        <button class="btn btn-warning w-100 mt-2">Edit Profile</button>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="col-md-8">

      <!-- PACKAGES -->
      <div class="card shadow p-3 mb-3">
        <h5>My Packages</h5>
        <button class="btn btn-success btn-sm mb-2">+ Add Package</button>

        <ul class="list-group">
          <li class="list-group-item">Wedding Package - $500</li>
          <li class="list-group-item">Birthday Package - $200</li>
        </ul>
      </div>

      <!-- PORTFOLIO -->
      <div class="card shadow p-3 mb-3">
        <h5>Portfolio</h5>
        <div class="row">
          <div class="col-4"><img src="https://via.placeholder.com/150" class="img-fluid"></div>
          <div class="col-4"><img src="https://via.placeholder.com/150" class="img-fluid"></div>
          <div class="col-4"><img src="https://via.placeholder.com/150" class="img-fluid"></div>
        </div>
      </div>

      <!-- BOOKINGS -->
      <div class="card shadow p-3">
        <h5>Booking Requests</h5>

        <table class="table">
          <tr>
            <th>Customer</th>
            <th>Date</th>
            <th>Status</th>
          </tr>
          <tr>
            <td>Amal</td>
            <td>2026-07-10</td>
            <td><span class="badge bg-warning">Pending</span></td>
          </tr>
        </table>

      </div>

    </div>

  </div>

</div>
<script>

  let user = JSON.parse(
          localStorage.getItem("user")
  );


  if(user){

    document.getElementById("providerName").innerHTML = user.name;

    document.getElementById("providerRole").innerHTML = user.role;

    document.getElementById("providerEmail").innerHTML = user.email;

  }
  else{

    window.location.href="login.html";

  }



  function logout(){

    localStorage.removeItem("user");

    window.location.href="login.html";

  }
</script>
</body>
</html>
