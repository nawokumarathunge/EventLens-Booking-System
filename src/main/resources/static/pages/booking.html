<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Provider | EventLens</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../styles/style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="../providers.html">
      <i class="fa fa-arrow-left me-2"></i> Back to Providers
    </a>
  </div>
</nav>

<!-- BOOKING SECTION -->
<div class="container mt-5">

  <div class="row justify-content-center">

    <div class="col-md-8">

      <div class="card shadow p-4">

        <h3 class="text-center mb-4">
          <i class="fa fa-calendar-check text-warning"></i>
          Book Your Event
        </h3>

        <form>

          <!-- Provider Name -->
          <div class="mb-3">
            <label class="form-label">Selected Provider</label>
            <input type="text" class="form-control" id="providerName" readonly>
          </div>

          <!-- Package -->
          <div class="mb-3">
            <label class="form-label">Select Package</label>
            <select class="form-select" id="package">
              <option value="">Select Package</option>
            </select>
          </div>

          <!-- Event Type -->
          <div class="mb-3">
            <label class="form-label">Event Type</label>
            <select class="form-select" id="eventType">
              <option value="">Select Event Type</option>
              <option>Wedding</option>
              <option>Birthday</option>
              <option>Graduation</option>
              <option>Corporate Event</option>
            </select>
          </div>

          <!-- Date -->
          <div class="mb-3">
            <label class="form-label">Event Date</label>
            <input type="date" class="form-control" id="eventDate">
          </div>

          <!-- Time -->
          <div class="mb-3">
            <label class="form-label">Event Time</label>
            <input type="time" class="form-control" id="eventTime">
          </div>

          <!-- Location -->
          <div class="mb-3">
            <label class="form-label">Event Location</label>
            <input type="text" class="form-control" placeholder="Enter event location"     id="location"
            >
          </div>

          <!-- Notes -->
          <div class="mb-3">
            <label class="form-label">Special Notes</label>
            <textarea class="form-control" rows="3" placeholder="Any special requirements..." id="notes"></textarea>
          </div>

          <button type="button" class="btn btn-warning w-100" onclick="goToPayment()">
           Continue to Payment
           </button>

        </form>

      </div>

    </div>

  </div>

</div>

<script src="../js/booking.js"></script>

<script>

function goToPayment(){

    window.location.href = "payment.html";

}

</script>

</body>
</html>
