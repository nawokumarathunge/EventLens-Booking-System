<!DOCTYPE html>
<html lang="en">
<head>

 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">

 <title>Payment | EventLens</title>

 <!-- Bootstrap -->
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

 <!-- Font Awesome -->
 <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

 <!-- CSS -->
 <link rel="stylesheet" href="../styles/style.css">

</head>

<body class="dashboard-bg">

<!-- ================= NAVBAR ================= -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

 <div class="container">

  <a class="navbar-brand fw-bold" href="../index.html">

   <i class="fa-solid fa-camera text-warning me-2"></i>

   EventLens

  </a>

  <div class="ms-auto">

   <a href="customer_dashboard.html"
      class="btn btn-outline-light me-2">

    Dashboard

   </a>

   <button class="btn btn-danger"
           onclick="logout()">

    Logout

   </button>

  </div>

 </div>

</nav>

<!-- ================= TITLE ================= -->

<div class="container mt-5">

 <div class="text-center">

  <h2 class="fw-bold">

   Complete Your Payment

  </h2>

  <p class="text-muted">

   Your booking has been confirmed.
   Complete the payment to secure your reservation.

  </p>

 </div>

</div>

<!-- ================= PAYMENT ================= -->

<div class="container mt-4 mb-5">

 <div class="row g-4">

  <!-- Booking Summary -->

  <div class="col-lg-5">

   <div class="card shadow border-0 h-100">

    <div class="card-header bg-warning">

     <h4 class="mb-0">

      <i class="fa fa-calendar-check me-2"></i>

      Booking Summary

     </h4>

    </div>

    <div class="card-body">

     <p>

      <strong>Provider :</strong>

      <span id="providerName"></span>

     </p>

     <p>

      <strong>Package :</strong>

      <span id="packageName"></span>

     </p>

     <p>

      <strong>Event :</strong>

      <span id="eventType"></span>

     </p>

     <p>

      <strong>Date :</strong>

      <span id="eventDate"></span>

     </p>

     <p>

      <strong>Time :</strong>

      <span id="eventTime"></span>

     </p>

     <hr>

     <h3 class="text-warning fw-bold"
         id="amount"></h3>

    </div>

   </div>

  </div>

  <!-- Payment Form -->

  <div class="col-lg-7">

   <div class="card shadow border-0">

    <div class="card-header bg-dark text-white">

     <h4 class="mb-0">

      <i class="fa fa-credit-card me-2"></i>

      Payment Details

     </h4>

    </div>

    <div class="card-body">

     <form id="paymentForm">

      <!-- Method -->

      <div class="mb-3">

       <label class="form-label">

        Payment Method

       </label>

       <select
               id="paymentMethod"
               class="form-select"
               required>

        <option value="">

         Select Payment Method

        </option>

        <option value="CREDIT_CARD">

         Credit Card

        </option>

        <option value="DEBIT_CARD">

         Debit Card

        </option>

        <option value="DIGITAL_WALLET">

         Digital Wallet

        </option>

       </select>

      </div>

      <!-- Card Holder -->

      <div class="mb-3">

       <label class="form-label">

        Card Holder Name

       </label>

       <input
               id="cardHolder"
               type="text"
               class="form-control"
               placeholder="Enter Card Holder's Name"
               required>

      </div>

      <!-- Card Number -->

      <div class="mb-3">

       <label class="form-label">

        Card Number

       </label>

       <input
               id="cardNumber"
               type="text"
               maxlength="19"
               class="form-control"
               placeholder="Enter Card Number"
               required>

      </div>

      <div class="row">

       <div class="col-md-6">

        <label class="form-label">

         Expiry Date

        </label>

        <input
                id="expiryDate"
                type="month"
                class="form-control"
                placeholder="Enter Expiry Date"
                required>

       </div>

       <div class="col-md-6">

        <label class="form-label">

         CVV

        </label>

        <input
                id="cvv"
                type="password"
                maxlength="3"
                class="form-control"
                placeholder="Enter CVV"
                required>

       </div>

      </div>

      <div class="mt-3">

       <label class="form-label">

        Billing Address

       </label>

       <textarea
               id="billingAddress"
               rows="3"
               class="form-control"
               placeholder="Enter Billing Address"
               required></textarea>

      </div>

      <div class="form-check mt-4">

       <input
               class="form-check-input"
               type="checkbox"
               id="agree">

       <label class="form-check-label"
              for="agree">

        I agree to the payment terms &
        conditions.

       </label>

      </div>

      <hr>

      <div class="d-flex justify-content-between">

       <a href="customer_dashboard.html"
          class="btn btn-outline-secondary">

        <i class="fa fa-arrow-left me-2"></i>

        Back

       </a>

       <button
               type="button"
               class="btn btn-success"
               onclick="confirmPayment()">

        <i class="fa fa-credit-card me-2"></i>

        Confirm Payment

       </button>

      </div>

     </form>

    </div>

   </div>

  </div>

 </div>

</div>

<footer class="bg-dark text-white text-center p-3">

 © 2026 EventLens | Secure Payment

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="../js/payment.js"></script>

</body>

</html>
